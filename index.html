<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Checklist Pensador Guerrero</title>

<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#0b0f14">
<link rel="apple-touch-icon" href="./icons/icon-192.png">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f14;
  color:#e8eef7;
  padding:16px;
}
.card{
  background:#121925;
  border-radius:14px;
  padding:14px;
  margin:12px 0;
}
label{display:flex;gap:10px;margin:10px 0}
button{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#36d399;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>⚔️ Checklist Pensador Guerrero</h2>
<div class="card" style="display:flex;gap:10px;flex-wrap:wrap">
  <div style="flex:1;min-width:140px">📆 Días: <b id="daysTotal">0</b></div>
  <div style="flex:1;min-width:140px">🏆 Ganados: <b id="winsTotal">0</b></div>
  <div style="flex:1;min-width:140px">🔥 Racha: <b id="streak">0</b></div>
</div>
<div class="card">
<label><input type="checkbox" id="body"> 🥊 Cuerpo (10 min)</label>
<label><input type="checkbox" id="project"> 💻 Proyecto (5 min)</label>
<label><input type="checkbox" id="noNightEat"> 🍽️ No comer de noche</label>
<label><input type="checkbox" id="discomfort"> ⚔️ Incomodidad</label>
<label><input type="checkbox" id="winDay"> 🏆 Día ganado</label>

<button onclick="resetDay()">Reset hoy</button>
</div>

<script>
const STORAGE="pg_checklist_v2";

// --- helpers ---
const pad2 = (n)=> String(n).padStart(2,"0");
const todayKey = ()=>{
  const d = new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
};
const daysBetween = (a,b)=> Math.floor((b-a)/(1000*60*60*24));

// --- load/save ---
function load(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE)) || null;
  }catch{
    return null;
  }
}
function save(s){ localStorage.setItem(STORAGE, JSON.stringify(s)); }

// --- state ---
let state = load();
if(!state){
  state = {
    startDate: todayKey(),
    date: todayKey(),
    checks: { body:false, project:false, noNightEat:false, discomfort:false, winDay:false },
    winsTotal: 0,
    streak: 0,
    lastCountedWinDate: null
  };
  save(state);
}

// Si cambió el día: resetea checks y gestiona racha (si ayer no fue ganado, racha = 0)
const t = todayKey();
if(state.date !== t){
  const prevWasWin = state.checks?.winDay === true;
  if(!prevWasWin) state.streak = 0;

  state.date = t;
  state.checks = { body:false, project:false, noNightEat:false, discomfort:false, winDay:false };
  save(state);
}

// --- bind UI ---
const ids = ["body","project","noNightEat","discomfort","winDay"];
const els = Object.fromEntries(ids.map(id=>[id, document.getElementById(id)]));

function refreshCounters(){
  const start = new Date(state.startDate + "T00:00:00");
  const now = new Date(state.date + "T00:00:00");
  const total = daysBetween(start, now) + 1;

  document.getElementById("daysTotal").textContent = total;
  document.getElementById("winsTotal").textContent = state.winsTotal;
  document.getElementById("streak").textContent = state.streak;
}

function refreshChecks(){
  ids.forEach(id => els[id].checked = !!state.checks[id]);

  // Día ganado solo si están los 4 bloques hechos
  const all4 = state.checks.body && state.checks.project && state.checks.noNightEat && state.checks.discomfort;
  els.winDay.disabled = !all4;
  if(!all4){
    state.checks.winDay = false;
    els.winDay.checked = false;
  }
}

function persist(){
  save(state);
  refreshChecks();
  refreshCounters();
}

function onChange(){
  state.checks.body = els.body.checked;
  state.checks.project = els.project.checked;
  state.checks.noNightEat = els.noNightEat.checked;
  state.checks.discomfort = els.discomfort.checked;

  const all4 = state.checks.body && state.checks.project && state.checks.noNightEat && state.checks.discomfort;
  els.winDay.disabled = !all4;

  // Día ganado: cuenta SOLO una vez por día
  if(els.winDay.checked && all4){
    state.checks.winDay = true;

    if(state.lastCountedWinDate !== state.date){
      state.winsTotal += 1;
      state.streak += 1;
      state.lastCountedWinDate = state.date;
    }
  } else {
    state.checks.winDay = false;
    // No restamos winsTotal si lo desmarcas; si quieres que sí, dímelo y lo ajusto.
  }

  persist();
}

ids.forEach(id => els[id].addEventListener("change", onChange));

function resetDay(){
  state.checks = { body:false, project:false, noNightEat:false, discomfort:false, winDay:false };
  save(state);
  refreshChecks();
  refreshCounters();
}
window.resetDay = resetDay;

// --- init ---
refreshChecks();
refreshCounters();

// --- SW ---
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
</html>
